<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Solar King · ติดตามงาน v3</title>
<style>
:root{
  --navy:#1B3A6B;--navy-dk:#0F2548;--navy-lt:#E8EDF5;
  --green-dk:#27500A;--green-lt:#EAF3DE;
  --amber-dk:#633806;--amber-lt:#FAEEDA;
  --blue-dk:#0C447C;--blue-lt:#E6F1FB;
  --purple-dk:#3C3489;--purple-lt:#EEEDFE;
  --red-dk:#791F1F;--red-lt:#FCEBEB;
  --gray-dk:#5f5e5a;--gray-lt:#f0f0ed;
  --bd:#d8dde8;--tx:#0f1f3d;--tx2:#4a5568;--tx3:#8a96a8;
  --bg:#fff;--bg2:#f4f6fa;--bg3:#eaeef5;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Sarabun,-apple-system,sans-serif;background:var(--bg2);color:var(--tx);font-size:14px;line-height:1.6;}
.topbar{background:var(--navy);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{width:36px;height:36px;border-radius:7px;object-fit:cover;}
.brand-name{font-weight:600;font-size:15px;color:#fff;}
.brand-name b{color:#E8C060;font-weight:600;}
.sync{font-size:12px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;}
.dot.sp{background:#fbbf24;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabbar{background:var(--bg);border-bottom:1px solid var(--bd);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.tabs{display:flex;}
.tab{padding:13px 14px;font-size:13px;font-weight:500;color:var(--tx2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;}
.tab.on{color:var(--navy);border-bottom-color:var(--navy);}
.cnt{display:inline-flex;background:var(--bg3);color:var(--tx3);border-radius:20px;font-size:11px;padding:0 7px;margin-left:5px;}
.tab.on .cnt{background:var(--navy-lt);color:var(--navy);}
.vtg{display:flex;gap:3px;padding:10px 0;}
.vb{border:1px solid var(--bd);background:var(--bg);border-radius:var(--r);padding:5px 10px;cursor:pointer;color:var(--tx2);font-size:14px;font-family:inherit;}
.vb.on{background:var(--bg3);color:var(--tx);}
.metrics{padding:1rem 1.5rem;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.metric{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px;}
.ml{font-size:12px;color:var(--tx2);margin-bottom:4px;}
.mn{font-size:24px;font-weight:600;}
.mn.red{color:#A32D2D;}
.main{padding:1rem 1.5rem 2rem;}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;}
.toolbar input,.toolbar select{font-family:inherit;font-size:13px;padding:7px 12px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.toolbar input{flex:1;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--navy);}
.btn-add{background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-add:hover{background:var(--navy-dk);}
.kanban{display:grid;gap:10px;align-items:start;}
.kcol{background:var(--bg3);border-radius:var(--rl);padding:10px;}
.kch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.kct{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;}
.kcn{font-size:11px;background:var(--bg);border:1px solid var(--bd);border-radius:20px;padding:1px 8px;color:var(--tx3);}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;}
.card:hover{box-shadow:0 2px 8px rgba(27,58,107,.1);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:2px;}
.cname{font-size:13px;font-weight:600;color:var(--tx);}
.cqt{font-size:11px;color:var(--navy);font-weight:500;margin-bottom:3px;}
.csub{font-size:12px;color:var(--tx2);margin-bottom:7px;line-height:1.4;}
.cft{display:flex;justify-content:space-between;align-items:center;}
.cdel{border:none;background:transparent;color:var(--tx3);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;opacity:0;}
.card:hover .cdel{opacity:1;}
.cdel:hover{background:var(--red-lt);color:#A32D2D;}
.lbadge{font-size:10px;background:var(--navy-lt);color:var(--navy);border-radius:20px;padding:1px 7px;font-weight:500;cursor:pointer;flex-shrink:0;}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;white-space:nowrap;}
.s-done{background:var(--green-lt);color:var(--green-dk);}
.s-act{background:var(--blue-lt);color:var(--blue-dk);}
.s-no{background:var(--red-lt);color:var(--red-dk);}
.s-wait{background:var(--amber-lt);color:var(--amber-dk);}
.s-pend{background:var(--purple-lt);color:var(--purple-dk);}
.due{font-size:11px;color:var(--tx3);}
.due.over{color:#A32D2D;font-weight:500;}
.tbl-wrap{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:600;color:var(--tx2);background:var(--bg3);border-bottom:1px solid var(--bd);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em;}
td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--tx);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.tda{display:flex;gap:4px;opacity:0;}
tr:hover .tda{opacity:1;}
.ib{border:none;background:var(--bg3);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:12px;color:var(--tx2);}
.ib:hover{background:var(--bd);}
.ib.del:hover{background:var(--red-lt);color:#A32D2D;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
.ov.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.mhd{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center;}
.mtitle{font-size:16px;font-weight:600;}
.mx{border:none;background:var(--bg3);border-radius:var(--r);width:30px;height:30px;cursor:pointer;font-size:18px;color:var(--tx2);display:flex;align-items:center;justify-content:center;}
.mbody{padding:18px 24px 24px;}
.fr{margin-bottom:13px;}
.fr label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.fr input,.fr select,.fr textarea{width:100%;font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;}
.fr input:focus,.fr select:focus,.fr textarea:focus,.fr input[onfocus]{border-color:var(--navy);}
.fr textarea{resize:vertical;min-height:65px;}
.fr input[readonly]{background:var(--bg3);color:var(--tx2);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.facts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--bd);}
.btnc{border:1px solid var(--bd);background:var(--bg);color:var(--tx2);border-radius:var(--r);padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;}
.btns{background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btns:hover{background:var(--navy-dk);}
.prt{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px;width:100%;}
.prth{display:grid;grid-template-columns:1fr 80px 70px 30px;background:var(--bg3);padding:7px 10px;font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.03em;gap:6px;}
.prr{display:grid;grid-template-columns:1fr 80px 70px 30px;gap:6px;padding:6px 8px;border-top:1px solid var(--bd);align-items:center;}
.prr input{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;outline:none;width:100%;}
.pradd{width:100%;background:var(--navy-lt);color:var(--navy);border:1px dashed #93A8CC;border-radius:var(--r);padding:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.prpv{border:1px solid #93A8CC;border-radius:var(--r);overflow:hidden;margin-top:4px;}
.prpvh{background:var(--navy);color:#fff;padding:7px 12px;font-size:11px;font-weight:600;letter-spacing:.04em;}
.prpvb{padding:8px 12px;background:#F4F6FA;}
.prpvr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid var(--bd);font-size:13px;}
.prpvr:last-of-type{border:none;}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx3);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--tx);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;z-index:1000;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.toast.err{background:#A32D2D;}
</style>
</head>

function sc(s){if(DONE.includes(s))return 's-done';if(ACT.includes(s))return 's-act';if(s==='ลูกค้าไม่อนุมัติ')return 's-no';if(['นัดสำรวจ','ใบขอสั่งซื้อ PR','รอเอกสารลูกค้า','จัดทำแบบ'].includes(s))return 's-wait';return 's-pend';}
function od(r){if(!r.dueDate||DONE.includes(r.status))return false;const d=new Date(r.dueDate);d.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);return d<n;}
function fd(d){if(!d)return'';const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});}
function toast(m,e){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(e?' err':'');setTimeout(()=>el.classList.remove('show'),3000);}
function getQTs(){return[...new Set(DB.quote.map(r=>r.qtNumber).filter(Boolean))].sort();}
function getProjs(){return[...new Set(DB.lead.map(r=>r.projectName).filter(Boolean))].sort();}
function lnk(r){const ref=r.qtNumber||r.projectName;const key=r.qtNumber?'qtNumber':'projectName';const tabs=key==='qtNumber'?['pr','construct','permit']:['quote'];return tabs.reduce((n,k)=>n+(DB[k].some(x=>x[key]===ref)?1:0),0);}
function esc(s){return(s||'').replace(/'/g,"\'")}

function showProj(val){

    rows.forEach(r=>{

    });
    h+='</div>';
  });
  if(!h)h='<div class="empty"><p>ไม่พบงานที่เชื่อมกัน</p></div>';

function upd(){
  Object.keys(TABS).forEach(k=>{
    const el=document.getElementById('c-'+k);
    if(el) el.textContent=(DB[k]||[]).length;
  });
  const all=Object.values(DB).flat();
  document.getElementById('m-all').textContent=all.length;
  document.getElementById('m-act').textContent=all.filter(r=>ACT.includes(r.status)).length;
  document.getElementById('m-done').textContent=all.filter(r=>DONE.includes(r.status)).length;
  const now=new Date();now.setHours(0,0,0,0);

function draw(){

function dKanban(rr,area){

    return `<div class="kcol"><div class="kch"><span class="kct">${s}</span><span class="kcn">${cc.length}</span></div>${ch}</div>`;
  }).join('');

}
function cHtml(r){
  const over=od(r);
  const lk=lnk(r);
  const lb=lk>0?`<span class="lbadge" onclick="event.stopPropagation();showProj('${esc(r.qtNumber||r.projectName)}')">🔗 ${lk}</span>`:'';

  let sub='';
  if(tab==='pr'&&r.items){try{const its=JSON.parse(r.items);sub=its.slice(0,2).map(i=>i.item+(i.qty?' ×'+i.qty:'')).join(', ')+(its.length>2?` +${its.length-2}`:'' );}catch(e){}}
  else sub=[r.system,r.size?r.size+'kWp':'',r.installedSize?'ติดตั้ง:'+r.installedSize+'kWp':'',r.permitType,r.source].filter(Boolean).join(' · ');
  return `<div class="card" onclick="showF('${r.id}')"><div class="ctop"><div class="cname" onclick="event.stopPropagation();showProj('${esc(r.projectName||r.qtNumber)}')">${r.projectName||r.prNumber||'-'}</div>${lb}</div>${qt}${sub?`<div class="csub">${sub}</div>`:''}<div class="cft"><span class="badge ${sc(r.status)}" style="font-size:10px">${r.assignee||'ยังไม่มอบหมาย'}</span><div style="display:flex;align-items:center;gap:5px">${r.dueDate?`<span class="due${over?' over':''}">${fd(r.dueDate)}</span>`:''}<button class="cdel" onclick="event.stopPropagation();del('${tab}','${r.id}')">✕</button></div></div></div>`;
}
function dTable(rr,area){
  const fs=FLD[tab].filter(f=>f.k!=='note'&&f.t!=='ta');
  const th='<tr><th>#</th>'+fs.map(f=>`<th>${f.lb}</th>`).join('')+'<th>หมายเหตุ</th><th></th></tr>';
  const tb=rr.map((r,i)=>{
    const over=od(r);
    const cells=fs.map(f=>{
      if(f.k==='status')return`<td><span class="badge ${sc(r.status)}">${r.status||'-'}</span></td>`;
      if(f.k==='projectName'){const lk=lnk(r);const lb2=lk>0?` <span class="lbadge" onclick="showProj('${esc(r.projectName)}')">🔗${lk}</span>`:'';return`<td><span style="cursor:pointer;font-weight:500" onclick="showProj('${esc(r.projectName)}')">${r[f.k]||'-'}</span>${lb2}</td>`;}
      if(f.k==='qtNumber')return`<td style="color:var(--navy);font-weight:500">${r.qtNumber||'-'}</td>`;
      if(f.k==='dueDate'||f.k==='submitDate')return`<td style="${over&&f.k==='dueDate'?'color:#A32D2D;font-weight:500':''}">${fd(r[f.k])}</td>`;
      if(f.k==='items'&&r.items){try{const its=JSON.parse(r.items);return`<td>${its.map(i=>i.item+(i.qty?' ×'+i.qty:'')).join(', ')}</td>`;}catch(e){}}
      return`<td>${r[f.k]||'-'}</td>`;
    }).join('');
    return`<tr><td style="color:var(--tx3);font-size:12px">${i+1}</td>${cells}<td style="color:var(--tx2);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||'-'}</td><td><div class="tda"><button class="ib" onclick="showF('${r.id}')">✏</button><button class="ib del" onclick="del('${tab}','${r.id}')">✕</button></div></td></tr>`;
  }).join('');
  area.innerHTML=`<div class="tbl-wrap"><table><thead>${th}</thead><tbody>${tb}</tbody></table></div>`;

  const r=id?DB[tab].find(x=>x.id===id):null;

      </div>`;

    else if(f.t==='qauto') inp=`<input type="text" id="f_${f.k}" value="${v}" placeholder="ดึงจาก QT อัตโนมัติ" readonly>`;
    else if(f.t==='pri') inp=`<div id="priw"></div>`;
    else if(f.t==='prnum'){inp=`<input type="text" id="f_${f.k}" value="${v}" placeholder="${f.ph||f.lb}" style="font-size:14px;font-weight:500;">`;} 
    else if(f.t==='sel') inp=`<select id="f_${f.k}"><option value="">-- เลือก --</option>`+(f.opts||[]).map(o=>`<option${v===o?' selected':''}>${o}</option>`).join('')+'</select>';

    pairs.push(`<div class="fr"><label>${f.lb}${f.req?' *':''}</label>${inp}</div>`);
  });
  for(let i=0;i<pairs.length;i+=2){

function rPRI(its){

  its.forEach((it,i)=>{
    const bg = i%2===0?'':'background:#f9fafc;';
    h+=`<div class="prr" style="${bg}">`;
    h+=`<input class="pn" data-i="${i}" value="${(it.item||'').replace(/"/g,'&quot;')}" placeholder="เช่น SolarEdge 5000H Inverter" style="font-size:13px" onfocus="this.style.borderColor='#1B3A6B'" onblur="this.style.borderColor='var(--bd)'" oninput="pRefresh()">`;
    h+=`<input class="pq" data-i="${i}" value="${it.qty||''}" placeholder="0" style="text-align:center;font-size:13px" onfocus="this.style.borderColor='#1B3A6B'" onblur="this.style.borderColor='var(--bd)'">`;
    h+=`<input class="pu" data-i="${i}" value="${it.unit||''}" placeholder="ชุด" style="font-size:13px" onfocus="this.style.borderColor='#1B3A6B'" onblur="this.style.borderColor='var(--bd)'">`;
    h+=its.length>1?`<button onclick="pDel(${i})" style="border:none;background:transparent;color:#A32D2D;cursor:pointer;font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center">×</button>`:'<div></div>';
    h+='</div>';
  });
  h+='</div>';
  
  // Add button
  if(its.length<10){
    h+=`<button class="pradd" onclick="pAdd()">+ เพิ่มรายการ (${its.length}/10)</button>`;
  } else {
    h+='<div style="text-align:center;font-size:12px;color:var(--tx3);padding:6px">ครบ 10 รายการแล้ว</div>';
  }

  // Preview - always show, even if empty  
  const fl=its.filter(x=>x.item&&x.item.trim());
  h+='<div class="prpv" style="margin-top:10px">';
  h+='<div class="prpvh">📋 พรีวิว PR</div>';

    fl.forEach((it,i)=>{

    });

  }
  h+='</div></div>';

  w.innerHTML=h;
  w.dataset.its=JSON.stringify(its);
}

function saveF(){
  const flds=FLD[tab];
  const req=flds.find(f=>f.req&&!document.getElementById('f_'+f.k)?.value);
  if(req){toast('กรุณากรอก '+req.lb,true);return;}
  const obj={};

  if(isEdit){

    const ex=DB[curTab2].find(r=>r.id===eid);
    obj.createdAt=ex?.createdAt||new Date().toISOString();
    const idx=DB[curTab2].findIndex(r=>r.id===eid);
    if(idx>=0) DB[curTab2][idx]={...DB[curTab2][idx],...obj};
    toast('อัปเดตแล้ว ✓');
  } else {
    obj.id='ID-'+Date.now();
    obj.createdAt=new Date().toISOString();
    DB[curTab2].push(obj);
    toast('เพิ่มรายการแล้ว ✓');
  }
  closeF(); upd(); draw();
  push(curTab2, obj, isEdit);
  checkNextStep(curTab2, obj);
}
function del(t,id){if(!confirm('ยืนยันลบรายการนี้?'))return;DB[t]=DB[t].filter(r=>r.id!==id);upd();draw();toast('ลบแล้ว');fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',tab:TABS[t].sh,id})}).catch(()=>{});}
function push(t,obj,isEdit){const flds=FLD[t];const hdrs=['id','createdAt',...flds.map(f=>f.k)];const row=hdrs.map(h=>obj[h]||'');fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:isEdit?'update':'add',tab:TABS[t].sh,id:obj.id,row})}).catch(()=>{});}

function checkNextStep(t, obj) {
  // ลูกค้าใหม่ → ออกแบบแล้ว → popup บันทึกการออกแบบ + ถามสร้างเสนอราคา
  if (t === 'lead' && obj.status === 'ออกแบบแล้ว') {
    showNextPrompt(
      '✏️ ออกแบบแล้วเสร็จ!',
      `โปรเจกต์ <b>${obj.projectName}</b> ออกแบบแล้วเสร็จ<br>ต้องการบันทึกข้อมูลการออกแบบและสร้างใบเสนอราคาไหม?`,
      [
        { label: '📐 บันทึกการออกแบบ', action: () => showDesignForm(obj.projectName) },
        { label: '📋 สร้างใบเสนอราคา', action: () => {
          const tabEl = document.querySelectorAll('.tab')[1];
          goTab('quote', tabEl);
          setTimeout(() => {
            showF();
            setTimeout(() => {
              const pn = document.getElementById('f_projectName');
              const ps = document.getElementById('f_projectName_sel');
              if (pn) pn.value = obj.projectName;
              if (ps) { for (let i=0; i<ps.options.length; i++) { if (ps.options[i].value === obj.projectName) { ps.selectedIndex = i; break; } } }
              const addr = document.getElementById('f_address');
              if (addr && obj.address) addr.value = obj.address;
            }, 100);
          }, 200);
        }}
      ]
    );
  }

  // เสนอราคา → ลูกค้าอนุมัติ → สร้างงานก่อสร้าง + ยื่นขออนุญาตอัตโนมัติ
  if (t === 'quote' && obj.status === 'ลูกค้าอนุมัติ') {
    autoCreateNext(obj);
  }
}

  const now = new Date().toISOString();
  const lead = DB.lead.find(r => r.projectName === src.projectName) || {};
  const address = lead.address || src.address || '';

  // สร้างงานก่อสร้างอัตโนมัติ
  const csId = 'CS-' + Date.now();
  const csObj = {
    id: csId, createdAt: now,
    qtNumber: src.qtNumber || '',
    projectName: src.projectName || '',
    address: address,
    installType: src.installType || '',
    system: src.system || '',
    size: src.size || '',
    installedSize: '',
    status: 'จัดทำแบบ',
    assignee: '',
    dueDate: '',
    note: 'สร้างอัตโนมัติเมื่อลูกค้าอนุมัติ'
  };
  DB.construct.push(csObj);
  push('construct', csObj, false);

  // สร้างงานยื่นขออนุญาตอัตโนมัติ
  const pmId = 'PM-' + (Date.now()+1);

    permitType: 'ขอติดตั้งใหม่',
    status: 'รอเอกสารลูกค้า',
    assignee: '',
    submitDate: '',
    dueDate: '',
    note: 'สร้างอัตโนมัติเมื่อลูกค้าอนุมัติ'
  };
  DB.permit.push(pmObj);

  upd();
  // แสดง popup แจ้งผล
  showNextPrompt(
    '🎉 ลูกค้าอนุมัติแล้ว!',
    `สร้างงานอัตโนมัติให้แล้ว 2 รายการ:<br><br>
    ✅ <b>งานก่อสร้าง</b> — ${src.projectName} (สถานะ: จัดทำแบบ)<br>

        goTab('construct', els[3]);
      }},
      { label: '📄 ไปที่ยื่นขออนุญาต', action: () => {

function prefillNext(targetTab, src) {
  document.getElementById('ovNext').classList.remove('open');
  const tabEls = document.querySelectorAll('.tab');
  const tabKeys = ['lead','quote','pr','construct','permit'];
  const idx = tabKeys.indexOf(targetTab);
  if (idx >= 0) goTab(targetTab, tabEls[idx]);
  setTimeout(() => {
    showF();
    setTimeout(() => {
      // fill qtNumber
      const qtSel = document.getElementById('f_qtNumber');
      if (qtSel && src.qtNumber) {
        for (let i=0; i<qtSel.options.length; i++) {
          if (qtSel.options[i].value === src.qtNumber) { qtSel.selectedIndex = i; break; }
        }
        // trigger autofill
        qtSel.dispatchEvent(new Event('change'));
      }
    }, 150);
  }, 200);
}

function showNextPrompt(title, msg, actions) {
  document.getElementById('nptitle').innerHTML = title;

  const btns = document.getElementById('npbtns');
  btns.innerHTML = '';
  // Close button
  const skip = document.createElement('button');
  skip.className = 'btnc';
  skip.textContent = 'ข้ามก่อน';
  skip.onclick = () => document.getElementById('ovNext').classList.remove('open');

  actions.forEach(a => {

}

// Background Sheets sync
function loadSheet(tabKey, sheetName, cb) {
  const cbName = 'cb_' + tabKey + '_' + Date.now();
  window[cbName] = function(raw) {
    try {
      const hdrs = raw[0] || [];
      const rws = raw.slice(1).map(row => {
        const o = {};
        hdrs.forEach((h, i) => { o[h] = String(row[i] || ''); });
        return o;
      }).filter(r => r.id);
      if(tabKey === 'design_data') {
      rws.forEach(r => {
        if(r.projectName) {
          try { DESIGNS[r.projectName] = {...r, equipment: JSON.parse(r.equipment||'[]')}; } catch(e) { DESIGNS[r.projectName] = r; }
          DESIGN_ROWS[r.projectName] = r;
        }
      });
    } else if (rws.length > 0) DB[tabKey] = rws;
    } catch(e) {}
    try { delete window[cbName]; } catch(e) {}
    const s = document.getElementById(cbName + '_s');
    if (s) s.remove();
    cb((DB[tabKey]||[]).length);
  };
  const s = document.createElement('script');
  s.id = cbName + '_s';
  s.src = API + '?tab=' + encodeURIComponent(sheetName) + '&callback=' + cbName;
  s.onerror = () => {
    try { delete window[cbName]; } catch(e) {}
    const el = document.getElementById(cbName + '_s');
    if (el) el.remove();
    cb(0);
  };
  document.head.appendChild(s);
}

setTimeout(() => {
  document.getElementById('sdot').className = 'dot sp';
  document.getElementById('stxt').textContent = 'กำลังซิงค์...';
  const tabKeys = Object.keys(TABS).filter(k => k !== 'design');
  // also load design summary
  loadSheet('design_data', 'สรุปการออกแบบ', (count) => {
    if(count > 0 && tab==='design') drawDesign();
  });
  let done = 0, total = 0;
  tabKeys.forEach(k => {
    loadSheet(k, TABS[k].sh, (count) => {
      total += count;
      done++;
      if (done === tabKeys.length) {
        document.getElementById('sdot').className = 'dot';
        document.getElementById('stxt').textContent = total > 0 ? 'ซิงค์แล้ว (' + total + ' รายการ)' : 'พร้อมใช้งาน';
        if (total > 0) { upd(); draw(); }
      }
    });
  });
}, 500);
</script>
